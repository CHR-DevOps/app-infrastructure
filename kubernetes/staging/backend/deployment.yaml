apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: staging

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      imagePullSecrets:
        - name: ghcr-secret

      containers:
        - name: backend
          image: ghcr.io/chr-devops/app-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000