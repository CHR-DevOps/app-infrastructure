name: Infra Apply + Bootstrap Cluster

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Get EC2 public IP
        id: tf
        run: echo "public_ip=$(terraform output -raw k8s_public_ip)" >> "$GITHUB_OUTPUT"

      - name: Wait for cloud-init / k3s
        run: |
          echo "Waiting for EC2 and k3s to finish bootstrap..."
          sleep 120

      - name: Save SSH key
        run: |
          echo "${{ secrets.AWS_EC2_SSH_PRIVATE_KEY }}" > devops-key.pem
          chmod 600 devops-key.pem

      - name: Install Argo CD and namespaces
        run: |
          HOST=${{ steps.tf.outputs.public_ip }}

          ssh -o StrictHostKeyChecking=no -i devops-key.pem ubuntu@$HOST << 'EOF'
            set -euxo pipefail

            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            kubectl get nodes

            kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
            kubectl create namespace dev --dry-run=client -o yaml | kubectl apply -f -
            kubectl create namespace test --dry-run=client -o yaml | kubectl apply -f -
            kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -
            kubectl create namespace prod --dry-run=client -o yaml | kubectl apply -f -

            kubectl apply -n argocd --server-side --force-conflicts -f \
              https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
          EOF